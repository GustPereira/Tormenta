name: Supabase migrations

# CI/CD do schema do Supabase: aplica as migrations em supabase/migrations/
# ao dar push na main. Requer o secret SUPABASE_DB_URL.
#
# IMPORTANTE: o runner do GitHub não tem IPv6, e a conexão DIRETA do Supabase é
# IPv6-only. Use a connection string do POOLER (IPv4): Dashboard → Connect →
# "Session pooler" (porta 5432) → copie o URI e troque [YOUR-PASSWORD] pela senha.
#   postgresql://postgres.<ref>:<senha>@aws-0-<regiao>.pooler.supabase.com:5432/postgres
on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Aplica migrations
        run: supabase db push --db-url "$SUPABASE_DB_URL"
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
